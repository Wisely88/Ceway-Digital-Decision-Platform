name: 按开奖日更新历史数据

on:
  schedule:
    # 北京时间：大乐透周一、周三、周六 22:30、23:30 及次日 00:30。
    - cron: "30 14,15,16 * * 1,3,6"
    # 北京时间：双色球周二、周四、周日 22:30、23:30 及次日 00:30。
    - cron: "30 14,15,16 * * 0,2,4"
  workflow_dispatch:
    inputs:
      game:
        description: 手动更新范围
        required: true
        default: all
        type: choice
        options:
          - all
          - dlt
          - ssq

permissions:
  contents: write

concurrency:
  group: ceway-lottery-history-update
  cancel-in-progress: false

jobs:
  update-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Shanghai

    steps:
      - name: 检出主分支
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 确定本次更新场景
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          REQUESTED_GAME: ${{ inputs.game }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            game="$REQUESTED_GAME"
          elif [[ "$EVENT_SCHEDULE" == *"1,3,6" ]]; then
            game="dlt"
          elif [[ "$EVENT_SCHEDULE" == *"0,2,4" ]]; then
            game="ssq"
          else
            echo "无法识别定时规则：$EVENT_SCHEDULE" >&2
            exit 1
          fi
          echo "game=$game" >> "$GITHUB_OUTPUT"
          echo "本次更新：$game"

      - name: 获取开奖数据
        shell: bash
        env:
          GAME: ${{ steps.scope.outputs.game }}
        run: |
          case "$GAME" in
            dlt)
              python scripts/update_dlt_history.py --source sporttery --mode append --limit 100
              ;;
            ssq)
              python scripts/update_ssq_history.py --source auto --mode append
              ;;
            all)
              python scripts/update_dlt_history.py --source sporttery --mode append --limit 100
              python scripts/update_ssq_history.py --source auto --mode append
              ;;
            *)
              echo "不支持的更新范围：$GAME" >&2
              exit 1
              ;;
          esac

      - name: 校验历史数据
        run: python scripts/validate_lottery_history.py

      - name: 检查是否发现新期号
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- backend/data/dlt_history.csv backend/data/ssq_history.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "未发现新期号，不发布。"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat -- backend/data/dlt_history.csv backend/data/ssq_history.csv
          fi

      - name: 配置 Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 构建公开网页
        if: steps.changes.outputs.changed == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run build:pages

      - name: 发布 GitHub Pages
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          pages_dir="$RUNNER_TEMP/ceway-gh-pages"
          git worktree add --detach "$pages_dir" origin/gh-pages
          rsync -a --delete --exclude .git frontend/dist/ "$pages_dir/"
          cd "$pages_dir"
          git add -A
          if git diff --cached --quiet; then
            echo "Pages 构建产物未变化。"
          else
            git commit -m "Publish latest lottery history"
            git push origin HEAD:gh-pages
          fi

      - name: 保存历史数据到主分支
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        env:
          GAME: ${{ steps.scope.outputs.game }}
        run: |
          git add backend/data/dlt_history.csv backend/data/ssq_history.csv
          git commit -m "Update $GAME lottery history ($(date +%F))"
          git push origin HEAD:main
